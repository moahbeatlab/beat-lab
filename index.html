<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beat Lab</title>
  <!-- fflate: compression for URL share (UMD global) -->
  <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
  <!-- smplr: sample-based drum kits (ESM, exposes window.__smplr) -->
  <script type="module">
    import { DrumMachine, getDrumMachineNames } from 'https://unpkg.com/smplr/dist/index.mjs';
    window.__smplr = { DrumMachine, getDrumMachineNames };
    window.dispatchEvent(new Event('smplr-ready'));
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
